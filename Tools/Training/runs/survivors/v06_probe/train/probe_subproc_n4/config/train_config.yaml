# SubprocVecEnv 速度比較用 probe run（10_curriculum_1 ベース）
# 変更点: wandb=false, eval_freq=0, vec_env_type=subproc
game: survivors
version_name: v06_probe
run_name: probe_subproc_n4
reward_fn: runs/survivors/v06/eureka/01/best/reward_fn.py

wandb: false
wandb_project: survivors
wandb_run_name: probe_subproc_n4

base_port: 8767
eval_port: 8771

device: cuda
total_steps: 100_000

n_envs: 4
n_steps: 1024
n_epochs: 5
batch_size: 256
clip_range: 0.2
target_kl: 0.02
ent_coef: 0.05
checkpoint_freq: 100_000
frame_skip: 4

anneal_min_steps: 300_000
anneal_threshold: 0.05
anneal_min_weight: 0.1
anneal_steps: 1_000_000

eval_freq: 0
eval_episodes: 10

entity_attention: true
recurrent: true
lstm_hidden_size: 256
n_lstm_layers: 1

noveld: true
noveld_beta: 0.3
noveld_alpha: 0.5

spalf: false
spalf_r_b: 0.4
spalf_alpha: 0.2
spalf_buffer_size: 200
spalf_warmup_episodes: 50
spalf_max_score: 15000

curriculum: true
curriculum_window: 20
curriculum_threshold: 2.0

vec_env_type: subproc
