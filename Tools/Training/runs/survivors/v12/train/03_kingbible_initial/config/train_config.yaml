# ================================
# run設定
# ================================
game: survivors
version_name: v12
run_name: 03_kingbible_initial

# ================================
# ログ
# ================================
wandb: true
wandb_project: survivors-v12
wandb_run_name: 03-kingbible-initial

# ================================
# ポート設定
# ================================
host: 127.0.0.1
base_port: 8768
eval_port: 8767

# ================================
# 訓練設定
# ================================
device: cuda

# 初期設定
#init_model: runs/survivors/v08/bc/bc/result/model_bc.zip
#init_vecnormalize: runs/survivors/v08/bc/bc/result/vecnormalize_bc.pkl
reward_fn: runs/survivors/v12/train/03_kingbible_initial/config/reward_fn.py

# 終了条件
total_steps: 1_000_000
checkpoint_freq: 50_000

# ゲームのフレームスキップ。大きいほど高速に学習できるが、細かい制御が難しくなる
frame_skip: 4
frame_stack: 1
entity_attention: true
no_vec_normalize: false

# n_envs*n_stepsのロールアウトバッファをbatch_sizeで分割しn_epochs回繰り返して学習する
n_envs: 4
n_steps: 1024
batch_size: 256
n_epochs: 5

# 並列で各環境を動かす
vec_env_type: subproc

# 訓練速度
learning_rate: 0.0003

# 1回の更新で、各行動の確率を 最大でも ±clip_range の比率までしか変化させない
# 0.1   [0.90, 1.10] 小さい	    安定だが学習が遅い
# 0.15	[0.85, 1.15] やや小さい 安定と速度のバランス寄り
# 0.2	  [0.80, 1.20] 標準	      SB3 のデフォルト（多くの問題で適切）
# 0.3	  [0.70, 1.30] 大きい	    不安定になりやすい
clip_range: 0.2

# これを超えたらepochを途中終了。n_epochsの補完として有効
target_kl: 0.02

# エントロピー正則化の重み。大きいほどランダムな行動をとるようになる
ent_coef: 0.05

eval_freq: 50_000
eval_episodes: 5

# LSTM
recurrent: true
lstm_hidden_size: 256
n_lstm_layers: 1

# noveld
noveld: true
noveld_beta: 0.3
noveld_alpha: 0.5

# SPALF+カリキュラム
curriculum_spalf: true

# タスクセルサンプラー
task_cell_sampler: true
task_cell_min_episodes: 30
task_cell_target_p10: 300.0
task_cell_progress_scale: 300.0
task_cell_random_floor: 0.05
task_cell_blocked_steps: 200_000
task_cell_enemy_phase_backtrack: 1
task_cell_enemy_param_mode: phase_fixed

# 武器アンロック
weapon_unlock_table: kingbible_first_v1
weapon_pool_policy: target_plus_anchor_if_unlocked

# IS0:武器のみ。アイテム系は一切なし
# IS1:passive アイテムあり、進化なし
# IS2:passive アイテムあり、進化あり
weapon_item_stage: IS0
weapon_unlock_min_episodes: 30
weapon_unlock_target_p10: 300.0
weapon_unlock_max_terminated_rate: 0.5
weapon_unlock_min_steps: 100_000
weapon_unlock_readiness_enemy_phase_cap: 2

# SPALF
spalf: false
spalf_r_b: 0.4
spalf_alpha: 0.2
spalf_buffer_size: 200
spalf_warmup_episodes: 50
spalf_max_score: 15000

# カリキュラム
curriculum: false
curriculum_window: 20
curriculum_threshold: 1.0
curriculum_alive_reward: 0.001
until-curriculum-complete: false
curriculum-complete-window: 20
curriculum-complete-min-episodes: 20
curriculum-complete-min-score-ratio: 1.0
curriculum-complete-min-episode-len-ratio: 1.0

# 武器カリキュラム
# カリキュラムでPhaseが停滞したら武器を追加していく、最終的にフルシステムになる
# curriculum_spalfが必須
#weapon_phase: auto

# reward_fnの報酬が安定してきたら、学習の安定化のために報酬の重みを徐々に減らす
anneal_use_global_reference: true
anneal_min_steps: 2_000_000
anneal_threshold: 0.10
anneal_steps: 1_000_000
anneal_check_freq: 20_000
anneal_min_weight: 0.1

# 武器ロールバック制御
#   W0→W1昇格
#    └ score window リセット + 露出ガード開始
#        (guard_steps=200k, min_new_weapon_episodes=20)
#        ↓ KING_BIBLE 未習熟でスコア低下
#    Phase4→Phase3 (rollback 1段目) ← 許可（max_normal_rollbacks=1）
#        ↓ まだスコア低い
#    Phase3→Phase2 試みる → ブロック
#        (ep_len > 2400*0.25=600 なので緊急rollbackにもならない)
#        ↓ 200k step 経過 かつ KING_BIBLE first_weapon ≥ 20 episode 達成
#    ガード解除 → 通常の rollback/promotion 判定に戻る
weapon_exposure_guard_steps: 200_000
weapon_exposure_guard_min_new_weapon_episodes: 20
weapon_exposure_guard_max_normal_rollbacks: 1
weapon_exposure_guard_emergency_ep_len_ratio: 0.25
